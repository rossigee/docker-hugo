name: Build and Push Docker Image

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Dockerfile'
      - 'Makefile'
      - '.github/workflows/build-and-push.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rossigee/docker-hugo

jobs:
  extract-metadata:
    runs-on: ubuntu-latest
    outputs:
      hugo-version: ${{ steps.hugo-version.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Extract Hugo version from Dockerfile
      id: hugo-version
      run: |
        HUGO_VERSION=$(grep "ENV HUGO_VERSION" Dockerfile | cut -d= -f2)
        echo "version=${HUGO_VERSION}" >> $GITHUB_OUTPUT
        echo "Hugo version: ${HUGO_VERSION}"

    - name: Generate build metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=raw,value=${{ steps.hugo-version.outputs.version }}
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,prefix={{branch}}-
        labels: |
          org.opencontainers.image.title=Hugo Static Site Generator
          org.opencontainers.image.description=Docker image for Hugo static site generator
          org.opencontainers.image.vendor=Ross Goldberg
          org.opencontainers.image.version=${{ steps.hugo-version.outputs.version }}

  build-amd64:
    needs: extract-metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build AMD64 image (push)
      if: github.event_name != 'pull_request'
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64
        push: true
        tags: ${{ needs.extract-metadata.outputs.tags }}
        labels: ${{ needs.extract-metadata.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true

    - name: Build AMD64 image (PR)
      if: github.event_name == 'pull_request'
      id: build-pr
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64
        load: true
        tags: ${{ needs.extract-metadata.outputs.tags }}
        labels: ${{ needs.extract-metadata.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-arm64:
    needs: extract-metadata
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build ARM64 image (push)
      if: github.event_name != 'pull_request'
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/arm64
        push: true
        tags: ${{ needs.extract-metadata.outputs.tags }}
        labels: ${{ needs.extract-metadata.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true

    - name: Build ARM64 image (PR)
      if: github.event_name == 'pull_request'
      id: build-pr
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/arm64
        load: true
        tags: ${{ needs.extract-metadata.outputs.tags }}
        labels: ${{ needs.extract-metadata.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  merge:
    needs: [extract-metadata, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
    - name: Log in to Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create multi-arch manifest
      run: |
        IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
        AMD64_DIGEST="${{ needs.build-amd64.outputs.digest }}"
        ARM64_DIGEST="${{ needs.build-arm64.outputs.digest }}"

        echo "AMD64 digest: ${AMD64_DIGEST}"
        echo "ARM64 digest: ${ARM64_DIGEST}"

        echo '${{ needs.extract-metadata.outputs.tags }}' | jq -r '.[]' | while IFS= read -r TAG; do
          [ -z "$TAG" ] && continue
          echo "Creating manifest for: $TAG"
          docker buildx imagetools create -t "$TAG" \
            "${IMAGE}@${AMD64_DIGEST}" \
            "${IMAGE}@${ARM64_DIGEST}"
        done

  test-push:
    needs: [extract-metadata, merge]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
    - name: Test AMD64 image
      run: |
        docker run --rm --platform linux/amd64 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.extract-metadata.outputs.hugo-version }} hugo version

    - name: Test ARM64 image
      run: |
        docker run --rm --platform linux/arm64 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.extract-metadata.outputs.hugo-version }} hugo version

  test-pr:
    needs: [extract-metadata, build-amd64]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Test AMD64 image
      run: |
        IMAGE_TAG=$(echo '${{ needs.extract-metadata.outputs.tags }}' | jq -r '.[0]')
        docker run --rm "$IMAGE_TAG" hugo version

  scan:
    needs: [extract-metadata, merge]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
    - name: Scan image for vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.extract-metadata.outputs.hugo-version }}
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results.sarif'

  sbom:
    needs: [extract-metadata, merge]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: read
    steps:
    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.extract-metadata.outputs.hugo-version }}
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.spdx.json
